# ============================================
# Heirloom - Docker Compose Configuration
# Development and Production environments
# ============================================

services:
  # Development Service
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: heirloom-dev
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=development
      - PORT=3011
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - TURBOPACK=1
    env_file:
      - .env.local
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      # Exclude from mount
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3011"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Production Service (for local testing)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: heirloom-prod
    ports:
      - "3011:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env.local
    restart: unless-stopped
    profiles:
      - production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    driver: bridge
